<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <title>เชื่อมต่อ HC-05</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding-top: 50px; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 320px; text-align: center; }
        button { background: #007bff; color: white; border: none; padding: 10px; width: 100%; border-radius: 6px; cursor: pointer; margin-bottom: 10px; font-size: 16px; transition: 0.3s; }
        button:hover { background: #0056b3; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea { resize: none; background: #f9f9f9; }
    </style>
</head>
<body>

<div class="card">
    <h3>🌐 ควบคุม HC-05 ผ่านเว็บ</h3>
    <button id="connectBtn">เชื่อมต่อ Bluetooth (COM Port)</button>
    <input type="text" id="sendData" placeholder="พิมพ์ข้อความที่ต้องการส่ง...">
    <button id="sendBtn" style="background: #28a745;">ส่งข้อมูล</button>
    <textarea id="output" rows="5" readonly placeholder="ข้อความจะแสดงที่นี่..."></textarea>
</div>

<script>
    let port;
    let writer;
    let isConnected = false;

    document.getElementById('connectBtn').addEventListener('click', async () => {
        // เช็คว่าถ้าเชื่อมต่ออยู่แล้ว ไม่ต้องทำอะไรเพิ่ม
        if (isConnected) {
            alert("✅ พอร์ตเชื่อมต่ออยู่แล้วครับ สามารถพิมพ์ส่งข้อมูลได้เลย");
            return;
        }

        try {
            // ขอสิทธิ์และเลือกพอร์ต
            port = await navigator.serial.requestPort();
            
            // สั่งเปิดพอร์ตความเร็ว 9600
            await port.open({ baudRate: 9600 }); 
            
            document.getElementById('output').value += "✅ เชื่อมต่อสำเร็จ!\n";
            isConnected = true; 
            document.getElementById('connectBtn').innerText = "เชื่อมต่อสำเร็จแล้ว";
            document.getElementById('connectBtn').style.background = "#6c757d";
            
            // เตรียมตัวส่งข้อมูล
            const textEncoder = new TextEncoderStream();
            textEncoder.readable.pipeTo(port.writable);
            writer = textEncoder.writable.getWriter();

        } catch (error) {
            console.error(error);
            if (error.name === 'NetworkError') {
                alert("❌ เปิดพอร์ตไม่ได้ครับ! กรุณาเช็คว่าปิด Serial Monitor ใน Arduino IDE หรือยัง");
            } else {
                alert("❌ การเชื่อมต่อล้มเหลว: " + error.message);
            }
        }
    });

    document.getElementById('sendBtn').addEventListener('click', async () => {
        if (!writer) return alert("กรุณาเชื่อมต่อ Bluetooth ก่อนครับ!");
        
        try {
            const text = document.getElementById('sendData').value;
            // ส่งข้อความพร้อมรหัสจบบรรทัด \r\n เพื่อให้ Arduino อ่านค่าง่ายขึ้น
            await writer.write(text + "\r\n"); 
            document.getElementById('output').value += "➡️ ส่ง: " + text + "\n";
            document.getElementById('sendData').value = ""; 
        } catch (error) {
            console.error(error);
            alert("❌ ส่งข้อมูลไม่สำเร็จ การเชื่อมต่ออาจหลุดไปแล้ว");
            isConnected = false; 
            document.getElementById('connectBtn').innerText = "เชื่อมต่อ Bluetooth (COM Port)";
            document.getElementById('connectBtn').style.background = "#007bff";
        }
    });
</script>

</body>
</html>
